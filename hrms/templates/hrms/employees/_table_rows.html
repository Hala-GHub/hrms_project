{% for emp in employees %}
<tr class="border-b hover:bg-gray-50 transition">
  <td class="px-4 py-3">
    <a href="{% url 'hrms:employee_detail' emp.pk %}" class="text-blue-600 hover:underline">
      {{ emp.full_name }}
    </a>
  </td>

  <td class="px-4 py-3">{{ emp.title }}</td>
  <td class="px-4 py-3">{{ emp.get_level_display }}</td>
  <td class="px-4 py-3">{{ emp.department }}</td>

  <td class="px-4 py-3">
    {% if emp.manager %}
      <a href="{% url 'hrms:employee_detail' emp.manager.pk %}" class="text-blue-600 hover:underline">
        {{ emp.manager.full_name }}
      </a>
    {% else %}
      —
    {% endif %}
  </td>

  <td class="px-4 py-3">
    <a href="{% url 'hrms:employee_update' emp.pk %}"
       class="text-green-600 font-medium hover:underline">
       Edit
    </a>

    <span class="mx-2 text-gray-400">|</span>

    <button
      hx-delete="{% url 'hrms:employee_delete' emp.pk %}"
      hx-target="closest tr"
      hx-swap="outerHTML"
      hx-confirm="Delete {{ emp.full_name }}?"
      class="text-red-600 font-medium hover:underline"
    >
      Delete
    </button>
  </td>
</tr>

{% empty %}
<tr>
  <td colspan="6" class="px-4 py-4 text-center text-gray-500">
    No employees found.
  </td>
</tr>
{% endfor %}
