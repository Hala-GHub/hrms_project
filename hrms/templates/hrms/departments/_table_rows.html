{% for dept in departments %}
<tr class="border-b hover:bg-gray-50 transition">
  <td class="px-4 py-3">
    <a href="{% url 'hrms:department_detail' dept.pk %}" class="text-blue-600 hover:underline">
      {{ dept.name }}
    </a>
  </td>

  <td class="px-4 py-3">
    {% if dept.parent %}
      <a href="{% url 'hrms:department_detail' dept.parent.pk %}" class="text-blue-600 hover:underline">
        {{ dept.parent.name }}
      </a>
    {% else %}
      —
    {% endif %}
  </td>

  <td class="px-4 py-3">{{ dept.sub_departments.count }}</td>
  <td class="px-4 py-3">{{ dept.employees.count }}</td>

  <td class="px-4 py-3">
    <a href="{% url 'hrms:department_update' dept.pk %}"
       class="text-green-600 font-medium hover:underline">
       Edit
    </a>

    <span class="mx-2 text-gray-400">|</span>

    <button
      hx-delete="{% url 'hrms:department_delete' dept.pk %}"
      hx-target="closest tr"
      hx-swap="outerHTML"
      hx-confirm="Delete {{ dept.name }}?"
      class="text-red-600 font-medium hover:underline"
    >
      Delete
    </button>
  </td>
</tr>

{% empty %}
<tr>
  <td colspan="5" class="px-4 py-4 text-center text-gray-500">
    No departments found.
  </td>
</tr>
{% endfor %}
